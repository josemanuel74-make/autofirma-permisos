<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justificación de Faltas - IES Leopoldo Queipo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

    <script type="text/javascript" src="{{ url_for('static', filename='js/autoscript.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .mode-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
            justify-content: center;
        }

        .mode-btn {
            padding: 10px 20px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .mode-btn.active {
            border-color: #3498db;
            background: #3498db;
            color: white;
        }

        .table-container {
            margin-top: 1rem;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }

        th,
        td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #fdfdfd;
            font-size: 0.9rem;
            color: #666;
        }

        .add-row-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .remove-btn {
            color: #e74c3c;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 5px;
        }

        .range-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            background: #fff;
            padding: 1.5rem;
            border: 1px solid #eee;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header-branding">
            <img src="{{ url_for('static', filename='img/logo.gif') }}" alt="Logo" class="logo">
            <div class="header-text">
                <span class="institute-name">IES LEOPOLDO QUEIPO</span>
                <span class="document-title">Justificación de Faltas</span>
            </div>
        </div>

        <div id="status" class="status-message info" style="display:none"></div>

        <div class="mode-selector">
            <button type="button" class="mode-btn active" id="modeSpecific" onclick="setMode('specific')">Días / Horas
                Sueltas</button>
            <button type="button" class="mode-btn" id="modeRange" onclick="setMode('range')">Periodo Continuo
                (Baja/Largo)</button>
        </div>

        <form id="justificanteForm" class="form-grid">
            <input type="hidden" id="absence_mode" name="absence_mode" value="specific">

            <div class="section-title">Datos del Profesorado</div>
            <div class="form-group full-width">
                <label for="nombre">Nombre y Apellidos *</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <div class="form-group">
                <label for="dni">DNI *</label>
                <input type="text" id="dni" name="dni" required>
            </div>
            <div class="form-group">
                <label for="nrp">NRP *</label>
                <input type="text" id="nrp" name="nrp" required>
            </div>

            <!-- MODE 1: SPECIFIC -->
            <div id="sectionSpecific" class="full-width">
                <div class="section-title">Detalle de Ausencias (Días/Horas)</div>
                <div class="table-container">
                    <table id="justificationTable">
                        <thead>
                            <tr>
                                <th style="width: 150px;">Día</th>
                                <th style="width: 100px;">Hora</th>
                                <th style="width: 120px;">Curso</th>
                                <th>Motivo / Observaciones</th>
                                <th style="width: 40px;"></th>
                            </tr>
                        </thead>
                        <tbody id="justificationBody">
                        </tbody>
                    </table>
                    <button type="button" class="add-row-btn" onclick="addRow()">+ Añadir Fila</button>
                </div>
            </div>

            <!-- MODE 2: RANGE -->
            <div id="sectionRange" class="full-width" style="display:none">
                <div class="section-title">Detalle del Periodo de Ausencia</div>
                <div class="range-inputs">
                    <div class="form-group">
                        <label for="fecha_inicio">Fecha Inicio *</label>
                        <input type="date" id="fecha_inicio" name="fecha_inicio">
                    </div>
                    <div class="form-group">
                        <label for="fecha_fin">Fecha Fin *</label>
                        <input type="date" id="fecha_fin" name="fecha_fin">
                    </div>
                    <div class="form-group full-width">
                        <label for="motivo_general">Motivo de la ausencia continuada *</label>
                        <input type="text" id="motivo_general" name="motivo_general"
                            placeholder="Ej: Incapacidad Temporal (Baja médica)">
                    </div>
                </div>
            </div>

            <div class="section-title">Documentación Adjunta</div>
            <div class="form-group full-width">
                <label for="descripcion_adjunto">Descripción del justificante adjunto (opcional)</label>
                <input type="text" id="descripcion_adjunto" name="descripcion_adjunto"
                    placeholder="Ej: Informe médico, citación judicial, etc.">
            </div>
            <div class="form-group full-width">
                <label for="archivo_adjunto">Subir Justificante (Imagen o PDF)</label>
                <input type="file" id="archivo_adjunto" accept="image/*,application/pdf">
                <input type="hidden" id="adjunto_base64" name="adjunto_base64">
                <input type="hidden" id="adjunto_nombre" name="adjunto_nombre">
            </div>

            <div class="section-title">Firma y Fecha de Solicitud</div>
            <div class="form-group">
                <label>Fecha del Documento</label>
                <input type="date" id="fecha_doc" name="fecha_doc" readonly class="readonly-field">
            </div>

            <div class="full-width" style="margin-top: 2rem;">
                <button type="submit" id="signBtn">Generar y Firmar con AutoFirma</button>
            </div>
        </form>
    </div>

    <script>
        let currentMode = 'specific';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('absence_mode').value = mode;

            document.getElementById('sectionSpecific').style.display = (mode === 'specific') ? 'block' : 'none';
            document.getElementById('sectionRange').style.display = (mode === 'range') ? 'block' : 'none';

            document.getElementById('modeSpecific').classList.toggle('active', mode === 'specific');
            document.getElementById('modeRange').classList.toggle('active', mode === 'range');

            // Required management
            const rangeInputs = ['fecha_inicio', 'fecha_fin', 'motivo_general'];
            rangeInputs.forEach(id => {
                document.getElementById(id).required = (mode === 'range');
            });
        }

        function addRow(data = {}) {
            const tbody = document.getElementById('justificationBody');
            const row = tbody.insertRow();
            row.innerHTML = `
                <td><input type="date" name="fila_dia[]" value="${data.dia || ''}" required></td>
                <td><input type="text" name="fila_hora[]" value="${data.hora || ''}" placeholder="Ej: 1ª"></td>
                <td><input type="text" name="fila_curso[]" value="${data.curso || ''}" placeholder="Ej: 2º A"></td>
                <td><input type="text" name="fila_motivo[]" value="${data.motivo || ''}" required></td>
                <td><button type="button" class="remove-btn" onclick="this.closest('tr').remove()">×</button></td>
            `;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof AutoScript !== 'undefined') {
                AutoScript.cargarAppAfirma();
            }
            const now = new Date();
            document.getElementById('fecha_doc').value = now.toISOString().split('T')[0];
            addRow(); // Initial row
        });

        function showMessage(msg, type) {
            const el = document.getElementById('status');
            el.innerHTML = msg;
            el.className = 'status-message ' + type;
            el.style.display = 'block';
        }

        function onSignSuccess(signatureB64) {
            showMessage("Firma completada. Enviando...", "success");
            const formData = new FormData(document.getElementById('justificanteForm'));
            const payload = Object.fromEntries(formData.entries());

            payload.fila_dia = formData.getAll('fila_dia[]');
            payload.fila_hora = formData.getAll('fila_hora[]');
            payload.fila_curso = formData.getAll('fila_curso[]');
            payload.fila_motivo = formData.getAll('fila_motivo[]');
            payload.signature = signatureB64;
            payload.type = 'justificante';

            // Clean up empty fields from mode switch
            if (currentMode === 'range') {
                payload.fila_dia = []; payload.fila_hora = []; payload.fila_curso = []; payload.fila_motivo = [];
            } else {
                payload.fecha_inicio = ''; payload.fecha_fin = ''; payload.motivo_general = '';
            }

            fetch('/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(r => r.json()).then(data => {
                if (data.status === 'success') {
                    showMessage("¡Documento guardado con éxito!", "success");
                    const dl = document.createElement('button');
                    dl.textContent = "Descargar PDF Firmado";
                    dl.onclick = () => {
                        const a = document.createElement('a');
                        a.href = "data:application/pdf;base64," + signatureB64;
                        a.download = "Justificante_Firmado.pdf";
                        a.click();
                    }
                    document.getElementById('status').appendChild(document.createElement('br'));
                    document.getElementById('status').appendChild(dl);
                }
            });
        }

        document.getElementById('justificanteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signBtn');
            btn.disabled = true;

            // Handle file upload to base64 before submitting
            const fileInput = document.getElementById('archivo_adjunto');
            if (fileInput.files.length > 0) {
                showMessage("Procesando archivo adjunto...", "info");
                const file = fileInput.files[0];
                const reader = new FileReader();
                reader.onload = async function (event) {
                    document.getElementById('adjunto_base64').value = event.target.result.split(',')[1];
                    document.getElementById('adjunto_nombre').value = file.name;
                    await submitForm();
                };
                reader.readAsDataURL(file);
            } else {
                await submitForm();
            }
        });

        async function submitForm() {
            const btn = document.getElementById('signBtn');
            const form = document.getElementById('justificanteForm');
            showMessage("Generando PDF dinámico...", "info");
            console.log("Submitting justificante form...");

            const formData = new FormData(form);
            try {
                const res = await fetch('/generate_justificante', { method: 'POST', body: formData });
                console.log("PDF Generation response status:", res.status);
                const result = await res.json();

                if (result.status === 'success') {
                    console.log("PDF Generated successfully. Base64 length:", result.pdf_base64.length);
                    console.log("Extra params:", result.extra_params);

                    if (typeof AutoScript === 'undefined') {
                        showMessage("Error: El motor de AutoFirma (AutoScript) no se ha cargado correctamente.", "error");
                        btn.disabled = false;
                        return;
                    }

                    console.log("Invocando AutoScript.sign...");
                    AutoScript.sign(result.pdf_base64, "SHA256withRSA", "PAdES", result.extra_params || null,
                        onSignSuccess, (t, m) => {
                            console.error("AutoScript Error:", t, m);
                            showMessage("Error de AutoFirma: " + m, "error");
                            btn.disabled = false;
                        });
                } else {
                    console.error("Server Error:", result.message);
                    showMessage("Error del servidor: " + result.message, "error");
                    btn.disabled = false;
                }
            } catch (err) {
                console.error("Fetch Exception:", err);
                showMessage("Error de red: " + err, "error");
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
