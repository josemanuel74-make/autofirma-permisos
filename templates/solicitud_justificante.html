<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justificación de Faltas - IES Leopoldo Queipo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

    <script type="text/javascript" src="{{ url_for('static', filename='js/autoscript.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .mode-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
            justify-content: center;
        }

        .mode-btn {
            padding: 10px 20px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            color: #333 !important;
            /* Force visible text against global white button text */
            width: auto !important;
            margin-top: 0 !important;
            box-shadow: none !important;
        }

        .mode-btn.active {
            border-color: #3498db;
            background: #3498db;
            color: white !important;
        }

        .hidden {
            display: none !important;
        }

        .table-container {
            margin-top: 1rem;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }

        th,
        td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #fdfdfd;
            font-size: 0.9rem;
            color: #666;
        }

        .add-row-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .remove-btn {
            color: #e74c3c;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 5px;
        }

        .range-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            background: #fff;
            padding: 1.5rem;
            border: 1px solid #eee;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header-branding">
            <img src="{{ url_for('static', filename='img/logo.gif') }}" alt="Logo" class="logo">
            <div class="header-text">
                <span class="institute-name">IES LEOPOLDO QUEIPO</span>
                <span class="document-title">Justificación de Faltas</span>
            </div>
        </div>

        <div id="status" class="status-message info" style="display:none"></div>

        <div class="mode-selector">
            <button type="button" class="mode-btn active" id="modeSpecific" onclick="setMode('specific')">Días / Horas
                Sueltas</button>
            <button type="button" class="mode-btn" id="modeRange" onclick="setMode('range')">Periodo Continuo
                (Baja/Largo)</button>
        </div>

        <form id="justificanteForm" class="form-grid">
            <input type="hidden" id="absence_mode" name="absence_mode" value="specific">

            <div class="section-title">Datos del Profesorado</div>
            <div class="form-group full-width">
                <label for="nombre">Nombre y Apellidos *</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <div class="form-group">
                <label for="dni">DNI *</label>
                <input type="text" id="dni" name="dni" required>
            </div>
            <div class="form-group">
                <label for="nrp">NRP (opcional)</label>
                <input type="text" id="nrp" name="nrp">
            </div>

            <!-- MODE 1: SPECIFIC -->
            <div id="sectionSpecific" class="full-width">
                <div class="section-title">Detalle de Ausencias (Días/Horas)</div>
                <div class="table-container">
                    <table id="justificationTable">
                        <thead>
                            <tr>
                                <th style="width: 150px;">Día</th>
                                <th style="width: 100px;">Hora</th>
                                <th style="width: 120px;">Curso</th>
                                <th>Motivo / Observaciones</th>
                                <th style="width: 40px;"></th>
                            </tr>
                        </thead>
                        <tbody id="justificationBody">
                        </tbody>
                    </table>
                    <button type="button" class="add-row-btn" onclick="addRow()">+ Añadir Fila</button>
                </div>
            </div>

            <!-- MODE 2: RANGE -->
            <div id="sectionRange" class="full-width hidden">
                <div class="section-title">Detalle del Periodo de Ausencia</div>
                <div class="range-inputs">
                    <div class="form-group">
                        <label for="fecha_inicio">Fecha Inicio *</label>
                        <input type="date" id="fecha_inicio" name="fecha_inicio">
                    </div>
                    <div class="form-group">
                        <label for="fecha_fin">Fecha Fin *</label>
                        <input type="date" id="fecha_fin" name="fecha_fin">
                    </div>
                    <div class="form-group full-width">
                        <label for="motivo_general">Motivo de la ausencia continuada *</label>
                        <input type="text" id="motivo_general" name="motivo_general"
                            placeholder="Ej: Incapacidad Temporal (Baja médica)">
                    </div>
                </div>
            </div>

            <div class="section-title">Documentación Adjunta</div>
            <div class="form-group full-width">
                <label for="descripcion_adjunto">Descripción del justificante adjunto *</label>
                <input type="text" id="descripcion_adjunto" name="descripcion_adjunto" required
                    placeholder="Ej: Informe médico, citación judicial, etc.">
            </div>
            <div class="form-group full-width">
                <label for="archivo_adjunto">Subir Justificante (Imagen o PDF) *</label>
                <input type="file" id="archivo_adjunto" name="archivo_adjunto" required accept="image/*,application/pdf">
                <input type="hidden" id="adjunto_base64" name="adjunto_base64">
                <input type="hidden" id="adjunto_nombre" name="adjunto_nombre">
            </div>

            <div class="section-title">Firma y Fecha de Solicitud</div>
            <div class="form-group">
                <label>Fecha del Documento</label>
                <input type="date" id="fecha_doc" name="fecha_doc" readonly class="readonly-field">
            </div>

            <div class="full-width" style="margin-top: 2rem;">
                <button type="button" id="signBtn" onclick="handleButtonClick()">Generar y Firmar con AutoFirma</button>
            </div>
        </form>
    </div>

    <!-- Loader Overlay -->
    <div id="loader" class="loader-overlay">
        <div class="loader-spinner"></div>
        <div id="loader-text" class="loader-text">Generando PDF...</div>
    </div>

    <script>
        let currentMode = 'specific';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('absence_mode').value = mode;

            const sectionSpecific = document.getElementById('sectionSpecific');
            const sectionRange = document.getElementById('sectionRange');

            if (mode === 'specific') {
                sectionSpecific.classList.remove('hidden');
                sectionRange.classList.add('hidden');
            } else {
                sectionSpecific.classList.add('hidden');
                sectionRange.classList.remove('hidden');
            }

            document.getElementById('modeSpecific').classList.toggle('active', mode === 'specific');
            document.getElementById('modeRange').classList.toggle('active', mode === 'range');

            const specificInputs = sectionSpecific.querySelectorAll('input');
            const rangeInputs = sectionRange.querySelectorAll('input');

            specificInputs.forEach(input => {
                input.disabled = (mode !== 'specific');
                if (input.name === 'fila_dia[]' || input.name === 'fila_motivo[]') {
                    input.required = (mode === 'specific');
                }
            });

            rangeInputs.forEach(input => {
                input.disabled = (mode !== 'range');
                if (['fecha_inicio', 'fecha_fin', 'motivo_general'].includes(input.id)) {
                    input.required = (mode === 'range');
                }
            });
        }

        function addRow(data = {}) {
            const tbody = document.getElementById('justificationBody');
            const row = tbody.insertRow();
            row.innerHTML = `
                <td><input type="date" name="fila_dia[]" value="${data.dia || ''}" required></td>
                <td><input type="text" name="fila_hora[]" value="${data.hora || ''}" placeholder="Ej: 1ª"></td>
                <td><input type="text" name="fila_curso[]" value="${data.curso || ''}" placeholder="Ej: 2º A"></td>
                <td><input type="text" name="fila_motivo[]" value="${data.motivo || ''}" required></td>
                <td><button type="button" class="remove-btn" onclick="this.closest('tr').remove()">×</button></td>
            `;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof AutoScript !== 'undefined') {
                AutoScript.cargarAppAfirma();
                // Optimización para móviles
                if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                    AutoScript.setForceWSMode(true);
                    var srvOrigin = window.location.origin;
                    if (window.location.protocol === "https:" && srvOrigin.startsWith("http:")) {
                        srvOrigin = srvOrigin.replace("http:", "https:");
                    }
                    AutoScript.setServlets(srvOrigin + "/storage", srvOrigin + "/retriever");
                } else {
                    AutoScript.setServlets(window.location.origin + "/storage", window.location.origin + "/retriever");
                }
            }
            const now = new Date();
            document.getElementById('fecha_doc').value = now.toISOString().split('T')[0];
            addRow(); 
        });

        function showMessage(msg, type) {
            const el = document.getElementById('status');
            el.innerHTML = msg;
            el.className = 'status-message ' + type;
            el.style.display = 'block';
        }

        function onSignError(type, message) {
            console.error("Signature error:", type, message);
            let displayMsg = "Error en firma (" + type + "): " + message;
            
            if (message.indexOf("recuperar") !== -1 || message.indexOf("conectar") !== -1) {
                displayMsg += "<br><br><b>💡 ¿Problemas en iOS?</b> Revisa tu conexión en <a href='/mobile-diag' target='_blank' style='color:white; font-weight:bold; text-decoration:underline;'>esta página de diagnóstico</a>.";
            }

            showMessage(displayMsg, "error");
            document.getElementById('signBtn').disabled = false;
            document.getElementById('signBtn').textContent = "Generar y Firmar con AutoFirma";
            hideLoader();

            if (window.lastPDF) {
                const statusEl = document.getElementById('status');
                const retryContainer = document.createElement('div');
                retryContainer.style.marginTop = "20px";
                retryContainer.style.textAlign = "center";
                
                const retryBtn = document.createElement('button');
                retryBtn.innerHTML = '🔄 REINTENTAR FIRMA MANUALMENTE (iOS)';
                retryBtn.className = 'mode-btn'; // Generic stylable class
                retryBtn.style.background = "#f39c12";
                retryBtn.style.color = "white !important";
                retryBtn.style.padding = "12px 24px";
                retryBtn.style.width = "100%";
                
                retryBtn.onclick = () => {
                   showMessage("Reintentando firma... asegúrese de tener AutoFirma instalada.", "info");
                   var dataToSign = window.lastPDF;
                   var params = window.lastParams;
                   if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                       dataToSign = null;
                       if (params.indexOf("id=") === -1 && window.lastSignId) {
                           params += (params ? "\n" : "") + "id=" + window.lastSignId;
                       }
                   }
                   AutoScript.sign(dataToSign, "SHA256withRSA", "PAdES", params, onSignSuccess, onSignError);
                };
                
                retryContainer.appendChild(retryBtn);
                statusEl.appendChild(retryContainer);
            }
        }

        function onSignSuccess(signatureB64) {
            showMessage("Firma completada con éxito. Guardando en servidor...", "success");
            
            const payload = {
                nombre: document.getElementById('nombre').value,
                dni: document.getElementById('dni').value,
                nrp: document.getElementById('nrp').value,
                absence_mode: currentMode,
                type: 'justificante',
                signature: signatureB64,
                fecha: document.getElementById('fecha_doc').value, // Para el webhook
                fecha_doc: new Date().toLocaleDateString('es-ES'),
                descripcion_adjunto: document.getElementById('descripcion_adjunto').value
            };

            if (currentMode === 'range') {
                payload.fecha_inicio = document.getElementById('fecha_inicio').value;
                payload.fecha_fin = document.getElementById('fecha_fin').value;
                payload.motivo_general = document.getElementById('motivo_general').value;
                payload.filas = [];
            } else {
                const dias = Array.from(document.querySelectorAll('input[name="fila_dia[]"]')).map(el => el.value);
                const horas = Array.from(document.querySelectorAll('input[name="fila_hora[]"]')).map(el => el.value);
                const cursos = Array.from(document.querySelectorAll('input[name="fila_curso[]"]')).map(el => el.value);
                const motivos = Array.from(document.querySelectorAll('input[name="fila_motivo[]"]')).map(el => el.value);
                
                payload.filas = [];
                for (let i = 0; i < dias.length; i++) {
                    payload.filas.push({
                        dia: dias[i],
                        hora: horas[i],
                        curso: cursos[i],
                        motivo: motivos[i]
                    });
                }
            }

            fetch('/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(r => {
                hideLoader();
                return r.json();
            }).then(data => {
                if (data.status === 'success') {
                    const statusEl = document.getElementById('status');
                    statusEl.innerHTML = '';
                    
                    const container = document.createElement('div');
                    container.className = 'final-container';

                    const msg = document.createElement('h2');
                    msg.textContent = '¡DOCUMENTO FIRMADO Y GUARDADO!';
                    container.appendChild(msg);

                    const dl = document.createElement('button');
                    dl.textContent = "DESCARGAR PDF FIRMADO";
                    dl.onclick = () => {
                        const a = document.createElement('a');
                        a.href = "data:application/pdf;base64," + signatureB64;
                        a.download = "Justificante_Firmado.pdf";
                        a.click();
                    }
                    container.appendChild(dl);
                    statusEl.appendChild(container);
                    statusEl.style.display = 'block';
                    statusEl.scrollIntoView({ behavior: 'smooth' });
                } else {
                    showMessage("Error al guardar: " + data.message, "error");
                }
            }).catch(err => {
                showMessage("Error de red al guardar: " + err, "error");
            }).finally(() => {
                document.getElementById('signBtn').disabled = false;
                document.getElementById('signBtn').textContent = "Generar y Firmar con AutoFirma";
            });
        }

        async function handleButtonClick() {
            const btn = document.getElementById('signBtn');
            const form = document.getElementById('justificanteForm');

            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            btn.disabled = true;
            btn.textContent = "Procesando...";
            await submitForm();
        }

        async function submitForm() {
            const btn = document.getElementById('signBtn');
            const form = document.getElementById('justificanteForm');
            showMessage("Generando PDF... por favor espere", "info");

            const formData = new FormData(form);
            try {
                const res = await fetch('/generate_justificante', { method: 'POST', body: formData });
                const result = await res.json();

                if (result.status === 'success') {
                    // Fallback link
                    const draftLink = `<br><a href="data:application/pdf;base64,${result.pdf_base64}" download="Borrador_No_Firmado.pdf" style="color: blue; text-decoration: underline;">Descargar borrador (si AutoFirma no abre)</a>`;
                    showMessage("PDF Generado con éxito. Abriendo AutoFirma..." + draftLink, "info");
                    showLoader("Abriendo AutoFirma...<br><small>Por favor, firme en la ventana emergente</small>");

                    if (typeof AutoScript !== 'undefined') {
                        window.lastPDF = result.pdf_base64;
                        window.lastParams = result.extra_params || null;
                        window.lastSignId = result.sign_id || null;

                        var dataToSign = window.lastPDF;
                        var params = window.lastParams;
                        
                        if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                            console.log("Usando Firma Triangulada para móvil (ID: " + result.sign_id + ")");
                            dataToSign = null; 
                            if (params.indexOf("id=") === -1 && window.lastSignId) {
                                params += (params ? "\n" : "") + "id=" + window.lastSignId;
                            }
                        }

                        AutoScript.sign(dataToSign, "SHA256withRSA", "PAdES", params, onSignSuccess, onSignError);
                    } else {
                        showMessage("Error: El motor de AutoFirma no se ha cargado.", "error");
                        btn.disabled = false;
                    }
                } else {
                    showMessage("Error generando PDF: " + result.message, "error");
                    btn.disabled = false;
                }
            } catch (err) {
                showMessage("Error de red: " + err, "error");
                btn.disabled = false;
                hideLoader();
            }
        }

        function showLoader(text) {
            document.getElementById('loader-text').innerHTML = text || "Procesando...";
            document.getElementById('loader').style.display = 'flex';
        }

        function hideLoader() {
            document.getElementById('loader').style.display = 'none';
        }
    </script>
</body>

</html>
